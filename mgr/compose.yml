version: "3.8"

services:
  whoami:
    image: docker.io/traefik/whoami
    container_name: whoami-app
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.bangasser.dev`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.tls.certresolver=le"
      - "traefik.http.middlewares.pass-cert.passtlsclientcert.pem=true"
      - "traefik.http.routers.whoami.middlewares=pass-cert"
      - "traefik.http.middlewares.pass-cert.passtlsclientcert.info.subject.commonname=true"

  step:
    image: docker.io/smallstep/step-ca
    container_name: ca
    restart: unless-stopped
    volumes:
      - ca:/home/step-ca
    environment:
      - DOCKER_STEPCA_INIT_NAME=Bangasser CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=ca.bangasser.dev
      - DOCKER_STEPCA_INIT_PASSWORD=your_secure_password
      - DOCKER_STEPCA_INIT_ACME=true
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.step-router.rule=HostSNI(`ca.bangasser.dev`)"
      - "traefik.tcp.routers.step-router.entrypoints=websecure"
      - "traefik.tcp.routers.step-router.tls.passthrough=true"
      - "traefik.tcp.routers.step-router.service=step-svc"
      - "traefik.tcp.services.step-svc.loadbalancer.server.port=9000"

volumes:
  ca: {}

networks:
  proxy:
    external: true
    name: proxy
