# --- Disk growth ------------------------------------------------------------
# Extends the root partition and filesystem to whatever disk size the
# hypervisor/EC2 actually gave the instance, no matter what disk_size was
# set at build time. Requires the plain (non-LVM) partitioning in ks.cfg.
growpart:
  mode: auto
  devices: ["/"]
  ignore_growroot_disabled: false

resize_rootfs: true

# --- Modules to run on every boot vs. only first boot ------------------------
cloud_init_modules:
  - migrator
  - seed_random
  - bootcmd
  - write-files
  - growpart
  - resizefs
  - users-groups
  - ssh

cloud_config_modules:
  - ssh-import-id
  - locale
  - set-passwords
  - timezone
  - package-update-upgrade-install

# --- Users --------------------------------------------------------------
# Build-time Kickstart user ("erid") only exists to let Packer provision the
# image. Replace it here with a real production user. Adjust the SSH key
# below to your own, or supply it per-launch via cloud-init user-data instead
# of hardcoding it in the image.
users:
  - name: ops
    groups: [wheel]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: false

# Disable password-based SSH login entirely; key-based only
ssh_pwauth: true

runcmd:
  - [ sh, -c, "id erid &>/dev/null && userdel -r erid || true" ]

# --- Housekeeping ---------------------------------------------------------
timezone: America/Chicago
package_update: true
package_upgrade: true

preserve_hostname: false

# --- Final cleanup ---------------------------------------------------------
# Removes cloud-init's cached instance data on shutdown so re-imaging or
# cloning this box doesn't reuse stale instance-id/seed data.
final_message: "cloud-init finished provisioning after $UPTIME seconds"
