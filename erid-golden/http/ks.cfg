#version=RHEL10
# ---------------------------------------------------------------------------
# Kickstart for AlmaLinux 10 — used by the QEMU/KVM Packer builder
# ---------------------------------------------------------------------------

# Accept the EULA / skip interactive prompts
eula --agreed
text
skipx

# Networking — DHCP, activate on boot (needed so Packer can reach it over SSH)
network --bootproto=dhcp --device=link --activate --onboot=yes

# Locale / keyboard / timezone — adjust to your org's standard
lang en_US.UTF-8
keyboard --xlayouts='us'
timezone America/Chicago --utc

# Root password — locked out; only the `erid` user (below) can log in
rootpw --lock

# Matches ssh_username/ssh_password in the packer "qemu" source block.
# --plaintext is fine for a throwaway build-time account; cloud-init
# will strip/replace this on first real boot in prod.
user --name=erid --password=erid --plaintext --groups=wheel

# Allow the `erid` user to sudo without a password (Packer's shell
# provisioner runs as this user and needs passwordless sudo)
%post
echo "erid ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/erid
chmod 440 /etc/sudoers.d/erid
%end

# Disk setup — wipe and auto-partition, matches disk_size = "5G" in packer
zerombr
clearpart --all --initlabel
autopart --type=plain --fstype=xfs --nohome
bootloader --location=mbr

# SELinux / firewall — permissive here for build simplicity; harden in
# your cloud-init/99-custom.cfg or a later provisioner step for prod
selinux --permissive
firewall --enabled --service=ssh

# Ensure sshd starts (required — Packer connects over SSH after reboot)
services --enabled=sshd

# Minimal package set — cloud-init and openssh-server get installed here;
# curl/git are also added by the packer shell provisioner, so redundant here
# is fine but not required
%packages
@core
openssh-server
cloud-init
%end

# Don't launch the initial setup wizard
firstboot --disable

# Reboot when the install finishes so Packer's SSH communicator can connect
reboot
